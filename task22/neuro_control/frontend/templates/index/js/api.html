<!-- templates/index/js/api.html -->

<script>

/*
    Получение JWT токена
    Вызывается перед каждым API-запросом
*/
async function getJWT() {
    const resp = await fetch("/get-token");

    if (!resp.ok) {
        throw new Error("Не удалось получить JWT токен");
    }

    const data = await resp.json();
    return data.access_token;
}


/*
    Универсальная функция для вызова API
*/
// Основная функция для работы с API и обработки результата
async function handleApiRequest(method, url, data = null, callback = null) {
    try {
        // Получаем JWT
        const tokenResp = await fetch("/get-token");
        const tokenData = await tokenResp.json();
        const jwt = tokenData.access_token;

        // Проверяем и переподключаем WS
        if (typeof wsReconnect === "function") {
            await wsReconnect(); // метод из websocket.html
        }

        // Формируем запрос
        let body = null;
        let headers = { "Authorization": `Bearer ${jwt}` };
        if (data) {
            if (data instanceof FormData) {
                body = data; // для файлов
            } else if (typeof data === "object") {
                body = JSON.stringify(data); // для JSON
                headers["Content-Type"] = "application/json";
            }
        }
        const response = await fetch(url, {
            method: method,
            headers: headers,
            body: body
        });
        if (!response.ok) {
            throw new Error(`Ошибка: ${response.statusText}`);
        }
        const result = await response.json();

        // Если передан callback, то выполняем 
        if (typeof callback === "function") { callback(result); return; }        
        
        // Обработка результата по-умолчанию
        if (reportsContainer.children.length === 0) {
            // Если карточек нет - создаем новую
            createReportCard(result.title);
        } else {
            // Находим последнюю карточку и заменяем её
            const plusCards = reportsContainer.querySelectorAll('.card');
            if (plusCards.length > 0) {
                const lastPlusCard = plusCards[plusCards.length - 1];
                lastPlusCard.innerHTML = `<div class="fw-bold">${result.title}</div>`;
                lastPlusCard.dataset.code = result.code;
                lastPlusCard.dataset.title = result.title;
                lastPlusCard.dataset.result = result.result || ""; 
            }
        }

        // Добавляем новую карточку с плюсом, если процесс не завершен
        if (!result.is_complete) {
            createReportCard('', 'plus');
        }

    } catch (error) {
        console.error("Ошибка API:", error);
        createReportCard("Ошибка", 'error');
    }
}

</script>
