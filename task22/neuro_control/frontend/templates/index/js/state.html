<script>
/*
 * state.html
 * ----------
 * Модуль отвечает за:
 *
 * 1. Загрузку текущего состояния шагов обработки (neuro/state)
 * 2. Восстановление карточек после перезагрузки страницы
 * 3. Обновление интерфейса после refresh из модального окна
 *
 * Почему вынесено отдельно:
 * - Логика состояния не смешивается с loader или modal
 * - Можно переиспользовать при автообновлении
 * - Улучшает читаемость архитектуры
 *
 * ВАЖНО:
 * Требует наличия:
 * - API_URL (глобальная переменная)
 * - clearReports()
 * - createReportCard()
 * - reportsContainer
  */


// --------------------------------------------------
// Загрузка текущего состояния шагов с backend
// --------------------------------------------------
async function loadState() {
    try {
        // ----------------------
        // Получаем JWT
        // ----------------------
        const tokenResp = await fetch("/get-token");
        const tokenData = await tokenResp.json();
        const jwt = tokenData.access_token;

        // ----------------------
        // Получаем состояние out
        // ----------------------
        const response = await fetch(`${API_URL}/neuro/state`, {
            method: "GET",
            headers: {
                "Authorization": `Bearer ${jwt}`
            }
        });

        if (!response.ok) throw new Error(`Ошибка: ${response.statusText}`);
        const state = await response.json();

        // ----------------------
        // Очищаем текущие карточки
        // ----------------------
        clearReports();

        const keys = Object.keys(state);
        if (keys.length === 0) return;

        // ----------------------
        // Рисуем карточки в порядке ключей из out
        // ----------------------
        keys.forEach((stepKey) => {
            const stepData = state[stepKey];
            createReportCard(
                stepData.title || stepKey,
                null,
                stepData.result || "",
                stepData.code || ""
            );
        });

        // ----------------------
        // Если последний шаг НЕ завершён — добавляем карточку "+"
        // ----------------------
        const lastStepKey = keys[keys.length - 1];
        if (!state[lastStepKey].is_complete) {
            createReportCard('', 'plus');
        }

    } catch (error) {
        console.error("Ошибка загрузки состояния:", error);
        createReportCard("Ошибка загрузки состояния", 'error');
    }
}

</script>
